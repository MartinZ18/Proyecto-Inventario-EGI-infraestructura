<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario ITU — Listado</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Link Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Link de iconos de Bootstrap -->
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-expand-md py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold fs-4">Inventario ITU</a>
 
            <!-- Toggler para mobile -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
 
            <div class="collapse navbar-collapse justify-content-end" id="navMenu">
                <ul class="navbar-nav align-items-md-center gap-md-2 mt-2 mt-md-0">
                    <li class="nav-item">
                        <a id="nomUsu" class="nav-link text-white">
                            <i class="bi bi-person-circle p-1"></i>
                            Nombre Usuario
                        </a>
                    </li>
                    <li class="nav-item">
                        <a id="btnCerrarSesion" class="btn btn-outline-light fw-semibold cerrar-sesion">
                            <img src="img/iconCerrarSesion.png" alt="Cerrar sesión" width="22" height="22" class="me-1">
                            Cerrar Sesión
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- FILTRO + BOTÓN NUEVA MÁQUINA -->
    <div class="container-fluid px-4 mt-4">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
 
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <h5 class="mb-0 fw-semibold text-muted">Filtrar por:</h5>
 
                <!-- Filtro tipo de ubicación -->
                <div class="dropdown">
                    <button class="btn btn-filtro dropdown-toggle px-4" type="button"
                        data-bs-toggle="dropdown" id="btnTipo">Tipo</button>
                    <ul class="dropdown-menu" id="menuTipo">
                        <li><a class="dropdown-item tipo-item" href="#" data-tipo="TODOS">Todos</a></li>
                        <li><a class="dropdown-item tipo-item" href="#" data-tipo="AULA">Aula</a></li>
                        <li><a class="dropdown-item tipo-item" href="#" data-tipo="LABORATORIO">Laboratorio</a></li>
                        <li><a class="dropdown-item tipo-item" href="#" data-tipo="BIBLIOTECA">Biblioteca</a></li>
                        <li><a class="dropdown-item tipo-item" href="#" data-tipo="OFICINA">Oficina</a></li>
                    </ul>
                </div>
 
                <!-- Filtro ubicación -->
                <div class="dropdown">
                    <button class="btn btn-filtro dropdown-toggle px-4" type="button"
                        data-bs-toggle="dropdown" id="btnUbicacion">
                        Ubicación
                    </button>
                    <ul class="dropdown-menu" id="menuUbicacion">
                        <!-- Se llena automáticamente por JS depenediendo el tipo de ubicación -->
                    </ul>
                </div>

            </div>
 
            <a href="formulario.html" id="btnNuevaMaq" class="btn btn-nueva-maq fw-semibold px-4">
                Nueva Máquina &nbsp;+
            </a>
        </div>
 
        <!-- TABLA -->
        <div class="table-responsive">
            <table class="table table-hover align-middle text-center table-bordered border-dark">
                <thead class="table-dark">
                    <tr class="text-muted small">
                        <th class="fw-normal py-3 text-center">ID</th>
                        <th class="fw-normal py-3 text-center">Aula</th>
                        <th class="fw-normal py-3 text-center">Mesa</th>
                        <th class="fw-normal py-3 text-center">Tipo</th>
                        <th class="fw-normal py-3 text-center">Estado</th>
                        <th class="fw-normal py-3 text-center">Ver Detalle</th>
                        <th class="fw-normal py-3 text-center">Eliminar</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <!-- filas generadas por Javascript -->
                </tbody>
            </table>
        </div>
 
        <!-- Sin resultados de máquinas -->
        <div id="sinResultados" class="text-center py-5 d-none">
            <p class="text-muted fs-5">No hay máquinas registradas.</p>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="js/listado.js"></script>
</body>
</html>
