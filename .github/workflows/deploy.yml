# ============================================================
# Pipeline de despliegue del Inventario ITU a Minikube.
#
# Disparo MANUAL (workflow_dispatch), siguiendo el patrón visto en
# clase ("Desplegando MongoDB y NGINX en Minikube"): un runner
# self-hosted instalado en la MISMA máquina donde corre Minikube,
# que construye las imágenes directo en el daemon de Docker de
# Minikube (sin pasar por un registry externo) y aplica los
# manifiestos de kubernetes/.
#
# Requisitos en la máquina del runner (una sola vez, ver
# docs/runbook-despliegue.md):
#   - minikube + kubectl instalados, `minikube start` ya ejecutado
#     (con --cni=calico para que las NetworkPolicies funcionen).
#   - Runner de GitHub Actions registrado como self-hosted con la
#     etiqueta "minikube" (Settings -> Actions -> Runners).
#   - `envsubst` disponible (paquete gettext-base; viene preinstalado en
#     los runners Ubuntu).
#   - `infra/red.local.env` creado a partir de `infra/red.example.env`
#     en la raíz de ESTE repo en la máquina del runner (gitignored, ver
#     infra/red.example.env) con las IPs reales de pfSense/AD/SQL Server
#     del laboratorio. `MINIKUBE_IP` se recalcula solo en cada corrida
#     (paso "Resolver configuración de red").
#
# Secrets de GitHub necesarios (Settings -> Secrets and variables ->
# Actions), usados para crear/actualizar el Secret "backend-secret"
# sin commitear contraseñas (ver kubernetes/secrets/backend-secret.example.yaml):
#   - JWT_SECRET            -> backend-secret.JWT_SECRET_KEY
#   - SQLSERVER_USER        -> backend-secret.SQLSERVER_USER
#   - SQLSERVER_PASSWORD    -> backend-secret.SQLSERVER_PASSWORD
#   - MONGO_ROOT_USER       -> backend-secret.MONGO_USER
#   - MONGO_ROOT_PASSWORD   -> backend-secret.MONGO_PASSWORD
#   - LDAP_BIND_PASSWORD    -> backend-secret.LDAP_BIND_PASSWORD (password
#                              de la cuenta de servicio svc-inventario@itu.local,
#                              ver active-directory/README.md sección 4)
# ============================================================

name: Deploy Inventario ITU a Minikube

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, minikube]

    steps:
      # 1) Checkout de este repo: trae todo — kubernetes/, docker/frontend/,
      #    backend/, frontend/, bases-de-datos/, infra/, etc.
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: infraestructura

      # 4) Resolver la configuración de red del laboratorio: carga
      #    infra/red.local.env (o infra/red.example.env con un aviso si
      #    no existe; MINIKUBE_IP es la IP estática del host Minikube) y
      #    SQLSERVER_IP por DNS contra el DC si no está fijado. Exporta
      #    todo a $GITHUB_ENV para los pasos siguientes.
      - name: Resolver configuración de red
        run: bash infraestructura/infra/scripts/detectar-red.sh

      # 5) Generar, a partir de los valores resueltos en el paso
      #    anterior, la versión final (sin placeholders ${VAR}) de los
      #    manifiestos de kubernetes/external/ y
      #    kubernetes/network-policies/ en kubernetes/_generated/
      #    (gitignored).
      - name: Generar manifiestos con la red resuelta
        run: bash infraestructura/infra/scripts/generar-manifiestos.sh

      # 6) Apuntar el cliente Docker al daemon DENTRO de Minikube, para que
      #    las imágenes que buildeamos queden disponibles para los Pods sin
      #    necesidad de un registry (de ahí imagePullPolicy: Never en los
      #    Deployments).
      - name: Configurar entorno Docker de Minikube
        run: |
          eval $(minikube -p minikube docker-env)
          echo "DOCKER_TLS_VERIFY=$DOCKER_TLS_VERIFY" >> "$GITHUB_ENV"
          echo "DOCKER_HOST=$DOCKER_HOST" >> "$GITHUB_ENV"
          echo "DOCKER_CERT_PATH=$DOCKER_CERT_PATH" >> "$GITHUB_ENV"
          echo "MINIKUBE_ACTIVE_DOCKERD=$MINIKUBE_ACTIVE_DOCKERD" >> "$GITHUB_ENV"

      # 7) Build de la imagen del backend (FastAPI + ODBC Driver 18).
      - name: Build imagen backend (inventario-api)
        run: docker build -t inventario-api:latest ./infraestructura/backend

      # 8) Build de la imagen del frontend, usando el Dockerfile/nginx.conf
      #    del mismo repo (docker/frontend/) sobre el código en frontend/.
      - name: Build imagen frontend (inventario-web)
        run: |
          cp infraestructura/docker/frontend/nginx.conf infraestructura/frontend/
          cp infraestructura/docker/frontend/.dockerignore infraestructura/frontend/
          docker build -f infraestructura/docker/frontend/Dockerfile -t inventario-web:latest infraestructura/frontend/

      # 9) Namespace, configuración no sensible y endpoints externos
      #    (SQL Server / AD fuera del clúster). Los endpoints externos se
      #    aplican desde kubernetes/_generated/external/ (paso 5), ya con
      #    ${SQLSERVER_IP}/${DC_IP} sustituidos por los valores reales.
      - name: Aplicar namespace, configmaps y endpoints externos
        run: |
          kubectl apply -f infraestructura/kubernetes/00-namespace.yaml
          kubectl apply -f infraestructura/kubernetes/configmaps/
          kubectl apply -f infraestructura/kubernetes/_generated/external/

      # 10) Crear/actualizar el Secret del backend a partir de los GitHub
      #     Secrets (nunca se commitea un Secret real al repo).
      - name: Crear/actualizar Secret del backend
        run: |
          kubectl create secret generic backend-secret \
            --namespace inventario \
            --from-literal=JWT_SECRET_KEY="${{ secrets.JWT_SECRET }}" \
            --from-literal=SQLSERVER_USER="${{ secrets.SQLSERVER_USER }}" \
            --from-literal=SQLSERVER_PASSWORD="${{ secrets.SQLSERVER_PASSWORD }}" \
            --from-literal=MONGO_USER="${{ secrets.MONGO_ROOT_USER }}" \
            --from-literal=MONGO_PASSWORD="${{ secrets.MONGO_ROOT_PASSWORD }}" \
            --from-literal=LDAP_BIND_PASSWORD="${{ secrets.LDAP_BIND_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # 11) Deployments y Services de backend, frontend y mongo.
      #     El rollout restart fuerza la recreación de todos los pods aunque
      #     el spec del Deployment no cambie — necesario porque las imágenes
      #     siempre se buildean con el tag :latest (mismo nombre, contenido
      #     nuevo) y kubectl apply no detecta ese cambio como motivo de rollout.
      - name: Aplicar deployments y services
        run: |
          kubectl apply -f infraestructura/kubernetes/deployments/
          kubectl apply -f infraestructura/kubernetes/services/
          kubectl rollout restart deployment/backend  -n inventario
          kubectl rollout restart deployment/frontend -n inventario
          kubectl rollout restart deployment/mongo    -n inventario

      # 12) NetworkPolicies zero-trust (deben aplicarse después de que
      #     existan los pods/labels que referencian). Se aplican desde
      #     kubernetes/_generated/network-policies/ (paso 5): la mayoría
      #     de los archivos no tienen placeholders y quedan igual, solo
      #     05-allow-backend-egress.yaml cambia (${IP_RED_PROF}).
      - name: Aplicar NetworkPolicies
        run: kubectl apply -f infraestructura/kubernetes/_generated/network-policies/

      # 13) Esperar a que los rollouts terminen para detectar fallos de
      #     arranque (CrashLoopBackOff por configuración inválida, etc.)
      #     directo en el log del workflow.
      - name: Esperar rollout de los Deployments
        run: |
          kubectl rollout status deployment/backend -n inventario --timeout=180s
          kubectl rollout status deployment/frontend -n inventario --timeout=180s
          kubectl rollout status deployment/mongo -n inventario --timeout=180s

      # 14) Seed de MongoDB: carga los documentos iniciales de componentes
      #     si la colección está vacía. Idempotente: si ya existen datos
      #     (deploy posterior al primero, o seed manual previo) sale sin
      #     tocar nada. Lee las credenciales del Secret de Kubernetes, no
      #     hace falta hardcodear nada aquí.
      - name: Seed MongoDB (idempotente)
        run: bash infraestructura/infra/scripts/seed-mongo.sh --backend-repo=./infraestructura/backend

      # 15) Resumen final: URL de acceso LAN (NodePort) y estado de los
      #     pods, útil para la demo. El acceso externo (fuera de la red
      #     del laboratorio) se resuelve aparte, vía el NAT port-forward
      #     de pfSense + el port-forward VirtualBox en pfSense-Gateway
      #     (ver pfsense/README.md sección 2), no requiere pasos del
      #     workflow.
      - name: Estado del despliegue
        run: |
          echo "Frontend (LAN) disponible en: http://${MINIKUBE_IP}:30080"
          echo "Acceso externo: NAT port-forward de pfSense + port-forward VirtualBox (ver pfsense/README.md seccion 2)"

          kubectl get pods -n inventario -o wide
