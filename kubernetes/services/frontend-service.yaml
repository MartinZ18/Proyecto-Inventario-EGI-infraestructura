# ============================================================
# Service NodePort del frontend. Punto de entrada en la LAN del
# laboratorio (http://${MINIKUBE_IP}:30080). El acceso externo se
# resuelve reenviando este NodePort: pfSense (NAT port-forward
# WAN:80 -> ${MINIKUBE_IP}:30080, ver pfsense/README.md sección 2) y,
# para llegar desde fuera de la red Host-Only, un port-forward a nivel
# VirtualBox en la VM pfSense-Gateway (host:80 -> WAN:80), ver
# docs/topologia-red.md.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: inventario
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
