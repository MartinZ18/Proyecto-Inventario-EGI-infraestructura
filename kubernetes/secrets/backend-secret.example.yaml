# ============================================================
# PLANTILLA de Secret para el backend. NO APLICAR ESTE ARCHIVO TAL CUAL.
#
# Este archivo es solo de referencia para que el equipo sepa qué claves
# espera el backend (`app/core/config.py`). El Secret real con los
# valores reales NUNCA se commitea al repositorio.
#
# Para crear el Secret real en el clúster, usar kubectl con
# --from-literal (los valores quedan en base64 en etcd, no en git):
#
#   kubectl create secret generic backend-secret \
#     --namespace inventario \
#     --from-literal=JWT_SECRET_KEY="$(python -c 'import secrets;print(secrets.token_hex(32))')" \
#     --from-literal=SQLSERVER_USER="inventario_app" \
#     --from-literal=SQLSERVER_PASSWORD="<password-real-de-SQL-Server>" \
#     --from-literal=MONGO_USER="inventario_app" \
#     --from-literal=MONGO_PASSWORD="<password-real-de-Mongo>" \
#     --from-literal=LDAP_BIND_PASSWORD="<password-real-de-svc-inventario>"
#
# En el pipeline de GitHub Actions (.github/workflows/deploy.yml) este
# mismo comando se ejecuta con `kubectl create secret ... --dry-run=client
# -o yaml | kubectl apply -f -`, usando GitHub Secrets como origen de los
# valores (SQLSERVER_PASSWORD, MONGO_ROOT_PASSWORD, JWT_SECRET).
#
# Para editar/ver el Secret ya creado:
#   kubectl edit secret backend-secret -n inventario
#   kubectl get secret backend-secret -n inventario -o jsonpath='{.data.JWT_SECRET_KEY}' | base64 -d
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: inventario
type: Opaque
stringData:
  # Generar con: python -c "import secrets; print(secrets.token_hex(32))"
  JWT_SECRET_KEY: "REEMPLAZAR_POR_UNA_CLAVE_ALEATORIA_DE_64_HEX"

  # Usuario/clave de la base SQL Server "inventario_ubicaciones".
  # Ver sql-server-iis/README.md para la creación de este login.
  SQLSERVER_USER: "REEMPLAZAR_USUARIO_SQLSERVER"
  SQLSERVER_PASSWORD: "REEMPLAZAR_PASSWORD_SQLSERVER"

  # Usuario/clave de MongoDB (autenticación SCRAM, authSource=admin).
  MONGO_USER: "REEMPLAZAR_USUARIO_MONGO"
  MONGO_PASSWORD: "REEMPLAZAR_PASSWORD_MONGO"

  # Password de la cuenta de servicio LDAP_BIND_DN (svc-inventario@itu.local,
  # configurada en kubernetes/configmaps/backend-configmap.yaml), usada por
  # obtener_rol() para el bind de admin que lee los grupos. Ver
  # active-directory/README.md sección 4.
  LDAP_BIND_PASSWORD: "REEMPLAZAR_PASSWORD_SVC_INVENTARIO"
